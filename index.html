<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Claude Code Buddy Simulator</title>
    <base href="/" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="topbar-left">
          <div class="window-dots" aria-hidden="true">
            <span class="dot dot-red"></span>
            <span class="dot dot-yellow"></span>
            <span class="dot dot-green"></span>
          </div>
          <div class="title-group">
            <h1 id="appTitle">Claude Code Buddy Simulator</h1>
            <p id="appSubtitle"></p>
          </div>
        </div>
        <div class="lang-switch">
          <button id="langToggle" class="lang-chip" type="button" aria-label="Switch language">English</button>
        </div>
      </header>

      <main class="terminal-frame">
        <div class="terminal-status">
          <span id="statusLeft"></span>
          <span id="statusCenter"></span>
          <span id="statusRight"></span>
        </div>

        <div class="terminal-notice">
          <span id="noticeText"></span>
          <span id="noticeCommand" class="rainbow-command"></span>
        </div>

        <section class="transcript-wrap">
          <div id="transcript" class="transcript"></div>
        </section>

        <section class="warehouse-panel hidden" id="warehousePanel" aria-label="Warehouse panel">
          <div class="panel-header">
            <div>
              <div class="panel-title" id="warehouseTitle"></div>
              <div class="panel-subtitle" id="warehouseSubtitle"></div>
            </div>
            <button id="closeWarehouseBtn" class="panel-close" type="button"></button>
          </div>
          <div class="panel-body">
            <div id="warehouseSlots" class="warehouse-slots"></div>
            <div id="warehouseDetail" class="warehouse-detail"></div>
          </div>
        </section>

        <section class="bottom-area">
          <div class="composer-shell" id="composerShell">
            <label class="prompt-glyph" for="promptInput">&gt;</label>
            <input id="promptInput" class="prompt-input" type="text" autocomplete="off" spellcheck="false" />
            <button id="sendButton" class="send-button" type="button">Enter</button>
          </div>

          <div class="footer-row">
            <div class="footer-pills">
              <button id="companionPill" class="footer-pill hidden" type="button"></button>
              <button id="warehousePill" class="footer-pill hidden" type="button"></button>
              <button id="stagePill" class="footer-pill hidden" type="button"></button>
            </div>
            <div id="footerHint" class="footer-hint"></div>
          </div>
        </section>

        <section class="stage-panel hidden" id="stagePanel" aria-label="Stage panel"></section>

        <aside id="companionStage" class="companion-stage hidden" aria-live="polite">
          <div id="speechBubble" class="speech-bubble hidden"></div>
          <pre id="spriteArt" class="sprite-art"></pre>
          <div id="companionMeta" class="companion-meta"></div>
        </aside>
      </main>
    </div>

    <noscript>This page needs JavaScript enabled.</noscript>
  <script type="module" src="/app.js"></script>
  </body>
</html>
